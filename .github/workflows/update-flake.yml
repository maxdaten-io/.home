name: Update Flake Inputs

on:
  workflow_dispatch: # Allow manual trigger
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at midnight UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Flake Lock
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Update all dependencies
        run: devenv shell just update

      - name: Format
        run: devenv shell just fmt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: Update all dependencies"
          title: "chore: Update all dependencies"
          branch: update-flake-lock
          labels: dependencies,automated
          draft: always-true
          body: |
            Automated update of all dependencies via `just update`.

            - Updated devenv
            - Updated flake.lock
            - Updated claude-code (npm)
            - Updated playwright-cli (npm)
            - Formatted with treefmt

            **Note:** This PR is created as a draft. Click "Ready for review" to trigger CI checks.
